<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="shortcut icon" href="../images/fav_icon_apunta_todo.png" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="cabecera cabecera-login">
            <a href="../index/index.html" class="logotipo">
                <img src="../images/logo_apunta_todo_con_nombre.png" alt="Logo Apunta_todo">
            </a>
            <nav class="navegacion-principal">
                <ul>
                    <li></li>
                </ul>
            </nav>
            <div class="user-area">
                <a href="../profile/profile.html">
                    <p>User Name</p>
                </a>
                <a href="../profile/profile.html"><span class="icon">👤</span></a>
            </div>
        </div>
    </header>

    <main>

        <div class="form-container">
            <form>
                <h2>Información Personal</h2>
                <label>Nombre</label>
                <input type="text" value="" id="nombre" />
                <label>Apellido</label>
                <input type="text" value="" id="apellido" />
                <label>Nombre de Usuario</label>
                <input class="input-with-prefix" type="text" value="" id="nombreUsuario" />
                <label>Correo Electrónico</label>
                <input type="email" value="" id="correo" />
                <label>Teléfono</label>
                <input type="tel" value="" id="telefono" />
        
                <h2>Seguridad</h2>
                <label>Contraseña actual</label>
                <input placeholder="••••••••••••" type="password" />
                <label>Nueva contraseña</label>
                <input type="password" />
                <label>Confirmar nueva contraseña</label>
                <input type="password" />
            </form>

            <input type="button" value="Guardar cambios" id="btnGuardar" class="boton">
            <input type="button" value="Cancelar" id="btnCancelar" class="boton boton-secundario">
            <input type="button" value="Cerrar sesión" id="btnCerrarSesion" class="boton boton-secundario">

        </div>

    </main>

    <footer>
        <div class="pie">
            <a href="#" class="logotipo">
                <img src="../images/logo_apunta_todo_con_nombre_gris.png" alt="Logo Apunta_todo">
            </a>
            <div class="redes">
                <img src="../images/icon_facebook.png" alt="icono facebook">
                <a href="https://www.facebook.com/" target="_blank">@facebook</a>
                <img src="../images/icon_whatsapp.png" alt="icono whatsapp">
                <a href="https://www.whatsapp.com/" target="_blank">@whatsapp</a>
                <img src="../images/icon_instagram.png" alt="icono instagram">
                <a href="https://www.instagram.com/" target="_blank">@instagram</a>
            </div>
        </div>
        <p class="derechos">Copyright ©️ 2025. Apunta ToDo. Todos los derechos reservados.</p>
        <p class="derechos">Proyecto Integrador - Cesde 2025</p>
    </footer>

    <script src="profile.js"></script>

</body>

</html>
